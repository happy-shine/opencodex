# OpenCodex Configuration
# Copy to ~/.opencodex/config.yaml and edit
# Docs: https://github.com/happy-shine/opencodex

gateway:
  port: 18790
  dataDir: "~/.opencodex"
  logLevel: "info"
  logFormat: "pretty"

engine:
  type: "codex"                 # codex | claude
  maxProcesses: 10
  idleTimeoutMs: 600000
  codex:
    binary: "codex"
    # model: "gpt-5.4"
    sandbox: "danger-full-access"
    approvalPolicy: "never"
    extraArgs: []
  claude:
    binary: "claude"
    model: "sonnet"
    extraArgs: []

auth:
  defaultPolicy: "pairing"

bots:
  - name: "my-bot"
    token: "123456:ABC-DEF..."
    auth:
      dmPolicy: "pairing"
      groupPolicy: "disabled"
      allowFrom: []
      groups: {}
      # groups:
      #   "-1001234567890":
      #     enabled: true
      #     allowFrom: []
